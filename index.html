<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>全屏图片 · 极简展示</title>
    <style>
        /* 彻底清除所有边距，只留一张图片 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;    /* 隐藏滚动条，保证全屏无空白 */
            background: #000;     /* 极黑背景，图片加载前或边缘不会露白 */
        }

        /* 单张图片，占据整个视口 */
        .fullscreen-image {
            width: 100vw;
            height: 100vh;
            object-fit: cover;    /* 图片按比例覆盖全屏，不变形，可能裁剪但绝不留下空白 */
            display: block;
            user-select: none;     /* 禁止选中 */
            -webkit-user-drag: none; /* 禁止拖动 */
            pointer-events: none;  /* 禁止任何点击交互（纯粹展示） */
        }

        /* 不需要任何包裹层，直接图片满屏 */
    </style>
</head>
<body>
    <!-- 
        给定图片：使用你最想展示的图片。
        将下方 src 引号内的路径替换为你自己的图片即可。
        支持 绝对路径/相对路径/网络图片。
    -->
    <img 
        class="fullscreen-image" 
        src="C:\项目\image.jpg" 
        alt="全屏展示图片"
    >

    <!-- 没有任何按钮、文字、控件 — 只有图片，绝对纯粹 -->
</body>
</html>
